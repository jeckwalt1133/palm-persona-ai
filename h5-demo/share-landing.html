<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI 读出了这个人的人格</title>
<style>
  :root {
    --bg: #1B1035;
    --gold: #FFD166;
    --gold-dim: rgba(255,209,102,0.15);
    --pink: #EF476F;
    --cyan: #06D6A0;
    --white: #ffffff;
    --white-dim: rgba(255,255,255,0.6);
    --white-faint: rgba(255,255,255,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .page {
    max-width: 420px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── 顶部过渡提示 ── */
  .transition-banner {
    width: 100%;
    text-align: center;
    padding: 16px 20px;
    background: rgba(255,209,102,0.08);
    border-radius: 16px;
    margin-bottom: 24px;
    border: 1px solid rgba(255,209,102,0.12);
  }

  .transition-banner .icon {
    font-size: 28px;
    margin-bottom: 6px;
  }

  .transition-banner .text {
    font-size: 15px;
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
  }

  .transition-banner .name {
    color: var(--gold);
    font-weight: 600;
  }

  /* ── 报告卡片(只读) ── */
  .share-card {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border-radius: 24px;
    padding: 28px 24px;
    border: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 24px;
  }

  .card-label {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .card-persona {
    font-size: 32px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .card-badge {
    font-size: 15px;
    color: var(--cyan);
    margin-bottom: 20px;
  }

  .card-divider {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 20px 0;
  }

  .card-truth {
    font-size: 18px;
    line-height: 1.7;
    color: rgba(255,255,255,0.85);
    margin-bottom: 16px;
    font-weight: 500;
  }

  .card-keywords {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .card-kw {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    background: var(--gold-dim);
    color: var(--gold);
    border: 1px solid rgba(255,209,102,0.2);
  }

  /* ── CTA 区 ── */
  .cta-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }

  .cta-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--white);
    text-align: center;
    line-height: 1.5;
  }

  .cta-subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    line-height: 1.6;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 16px 48px;
    background: linear-gradient(135deg, var(--gold), #F5A623);
    color: var(--bg);
    font-size: 18px;
    font-weight: 700;
    border-radius: 32px;
    text-decoration: none;
    letter-spacing: 1px;
    box-shadow: 0 4px 20px rgba(255,209,102,0.25);
  }

  .cta-btn:active {
    transform: scale(0.97);
  }

  /* ── 社交证明 ── */
  .social-proof {
    text-align: center;
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    line-height: 1.6;
  }

  .social-proof strong {
    color: rgba(255,255,255,0.5);
    font-weight: 500;
  }

  /* ── 品牌声明 ── */
  .brand-footer {
    text-align: center;
    font-size: 13px;
    color: rgba(255,255,255,0.2);
    padding: 24px 0;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="page">

  <!-- 过渡提示：从A的分享→B的体验是连续故事 -->
  <div class="transition-banner">
    <div class="icon">&#128075;</div>
    <div class="text">
      <span class="name">你的朋友</span> 刚通过手掌了解了自己的人格——<br>AI 读出了ta的这张身份卡
    </div>
  </div>

  <!-- 分享者报告卡片(只读) -->
  <div class="share-card">
    <div class="card-label">人格画像</div>
    <div class="card-persona">星辰梦想家</div>
    <div class="card-badge">手掌形塑的 · 星辰梦想家</div>

    <div class="card-divider"></div>

    <div class="card-truth">
      你掌心清晰的纹路，藏着一个内心沉静的人——但骨子里，你是情绪细腻的。你比你表现出来的更复杂。
    </div>

    <div class="card-keywords">
      <span class="card-kw">浪漫</span>
      <span class="card-kw">直觉</span>
      <span class="card-kw">创造力</span>
    </div>
  </div>

  <!-- CTA：从"看朋友的报告"到"测我自己的" -->
  <div class="cta-section">
    <div class="cta-title">
      AI 怎么看你的内心？
    </div>
    <div class="cta-subtitle">
      拍一张手掌，AI 会告诉你掌心线条里藏着怎样的你。<br>不是算命——是了解自己的一种新方式。
    </div>
    <a href="#" class="cta-btn" onclick="alert('Demo: 跳转到拍照页面')">
      免费拍一张，看看 AI 怎么说你
    </a>
  </div>

  <!-- 社交证明 -->
  <div class="social-proof">
    每天都有新的人通过手掌发现自己的另一面<br>
    <strong>今天是你。</strong>
  </div>

  <!-- 品牌声明 -->
  <div class="brand-footer">
    掌心人格局 · AI 趣味解读 · 认真但不较真<br>
    你的手掌里藏着的，可能比你以为的多
  </div>

</div>

<script>
  // 演示: 从URL读取分享者信息 (Teleport模式 — 跨Surface接续)
  const params = new URLSearchParams(window.location.search);
  const sharerName = params.get('from') || '你的朋友';
  const personaType = params.get('type') || 'starry-dreamer';
  const personaLabel = params.get('label') || '星辰梦想家';

  // 更新页面内容为实际分享者数据
  if (params.has('from')) {
    document.querySelector('.name').textContent = sharerName;
    document.querySelector('.card-persona').textContent = personaLabel;
    document.querySelector('.card-badge').textContent = '手掌形塑的 · ' + personaLabel;
    document.title = sharerName + ' 的人格是「' + personaLabel + '」——来看看你的';
  }

  console.log('[Teleport] 分享落地页 — 从A的分享→B的体验是连续故事');
  console.log('[Teleport] 分享者:', sharerName, '| 人格:', personaLabel);
  console.log('[Teleport] 接收者看到: 分享者报告卡片(只读) + CTA → 打开自己的分析');
</script>
</body>
</html>
